<!DOCTYPE html>
<html lang="fr">
<head>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #f4f4f4;
}

.container {
    max-width: 600px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

h1 {
    color: #333;
}

label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 20px;
    border: 1px solid #ddd;
    border-radius: 4px;
    box-sizing: border-box;
}

button {
    padding: 10px 20px;
    background-color: #5c67f2;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #4a54e1;
}
 </style> 
</head>
<body>
    <div class="container">
        <h1>Passer votre commande</h1>
        <form action="/submit-order" method="POST">
            <label for="name">Nom complet :</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Adresse email :</label>
            <input type="email" id="email" name="email" required>

            <label for="address">Adresse de livraison :</label>
            <textarea id="address" name="address" rows="3" required></textarea>

            <label for="product">Sélectionnez un article :</label>
            <select id="product" name="product">
                <option value="item1">Article 1</option>
                <option value="item2">Article 2</option>
                <option value="item3">Article 3</option>
            </select>

            <label for="payment">Mode de paiement :</label>
            <select id="payment" name="payment">
                <option value="credit_card">Carte bancaire (Visa, Mastercard)</option>
                <option value="paypal">PayPal</option>
                <option value="apple_pay">Apple Pay</option>
            </select>

            <button type="submit">Valider la commande</button>
        </form>
    </div>
</body>
</html>
